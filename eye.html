<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Eye</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  svg {
    width: min(60vw, 60vh);
    height: min(60vw, 60vh);
    filter: drop-shadow(0 0 24px rgba(100, 180, 255, 0.4));
  }
</style>
</head>
<body>
<svg id="eye" viewBox="-100 -50 200 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="eyeClip">
      <ellipse id="clipEllipse" cx="0" cy="0" rx="95" ry="42"/>
    </clipPath>
    <radialGradient id="irisGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#7ecfff"/>
      <stop offset="40%"  stop-color="#2a8fcc"/>
      <stop offset="100%" stop-color="#0a3a55"/>
    </radialGradient>
    <radialGradient id="pupilGrad" cx="35%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#333"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="scleraGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#f5f5f0"/>
      <stop offset="100%" stop-color="#d0cfc8"/>
    </radialGradient>
    <filter id="irisBlur">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- sclera (white of eye) -->
  <ellipse cx="0" cy="0" rx="95" ry="42" fill="url(#scleraGrad)"/>

  <!-- all inner parts clipped to eye shape -->
  <g clip-path="url(#eyeClip)">
    <!-- iris -->
    <circle id="iris" cx="0" cy="0" r="26" fill="url(#irisGrad)"/>
    <!-- iris texture rings -->
    <circle id="irisRing1" cx="0" cy="0" r="22" fill="none" stroke="rgba(0,60,100,0.25)" stroke-width="2" filter="url(#irisBlur)"/>
    <circle id="irisRing2" cx="0" cy="0" r="17" fill="none" stroke="rgba(0,40,80,0.2)"  stroke-width="1.5" filter="url(#irisBlur)"/>
    <!-- pupil -->
    <circle id="pupil" cx="0" cy="0" r="13" fill="url(#pupilGrad)"/>
    <!-- highlight -->
    <circle id="highlight1" cx="0" cy="0" r="4.5" fill="rgba(255,255,255,0.85)"/>
    <circle id="highlight2" cx="0" cy="0" r="2"   fill="rgba(255,255,255,0.5)"/>
  </g>

  <!-- eyelid top -->
  <path id="lidTop" d="M -95,0 Q 0,-90 95,0" fill="#1a0a05" stroke="#0a0503" stroke-width="1"/>
  <!-- eyelid bottom -->
  <path id="lidBot" d="M -95,0 Q 0,70 95,0"  fill="#1a0a05" stroke="#0a0503" stroke-width="1"/>

  <!-- outline -->
  <ellipse cx="0" cy="0" rx="95" ry="42" fill="none" stroke="#0a0503" stroke-width="2.5"/>
</svg>

<script>
const svg = document.getElementById('eye');
const iris      = document.getElementById('iris');
const irisRing1 = document.getElementById('irisRing1');
const irisRing2 = document.getElementById('irisRing2');
const pupil     = document.getElementById('pupil');
const h1        = document.getElementById('highlight1');
const h2        = document.getElementById('highlight2');
const lidTop    = document.getElementById('lidTop');
const lidBot    = document.getElementById('lidBot');

const MAX_TRAVEL = 30;  // max px the pupil moves from center (in viewBox units)
const EYE_W = 95, EYE_H = 42;

let targetX = 0, targetY = 0;
let currentX = 0, currentY = 0;
let isBlinking = false;
let blinkProgress = 0; // 0=open, 1=fully closed

// Mouse tracking
document.addEventListener('mousemove', e => {
  const rect = svg.getBoundingClientRect();
  const cx = rect.left + rect.width  / 2;
  const cy = rect.top  + rect.height / 2;
  const dx = e.clientX - cx;
  const dy = e.clientY - cy;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  const scale = Math.min(dist, rect.width * 0.35) / dist;
  // Convert to viewBox units
  const vbScaleX = 200 / rect.width;
  const vbScaleY = 100 / rect.height;
  targetX = dx * scale * vbScaleX * 0.38;
  targetY = dy * scale * vbScaleY * 0.38;
});

// Autonomous drifting when mouse is idle
let lastMouseMove = Date.now();
document.addEventListener('mousemove', () => { lastMouseMove = Date.now(); });

function autonomousTarget() {
  if (Date.now() - lastMouseMove > 2000) {
    const t = Date.now() / 1000;
    targetX = Math.sin(t * 0.7) * MAX_TRAVEL * 0.8;
    targetY = Math.sin(t * 0.4 + 1) * MAX_TRAVEL * 0.35;
  }
}

// Blink logic
function blink() {
  if (isBlinking) return;
  isBlinking = true;
  const duration = 140;
  const start = performance.now();
  function step(now) {
    const t = (now - start) / duration;
    if (t < 0.5) {
      blinkProgress = t * 2;
    } else if (t < 1) {
      blinkProgress = 1 - (t - 0.5) * 2;
    } else {
      blinkProgress = 0;
      isBlinking = false;
      scheduleBlink();
      return;
    }
    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function scheduleBlink() {
  const delay = 2500 + Math.random() * 4000;
  setTimeout(blink, delay);
}
scheduleBlink();

function moveElements(x, y) {
  const parts = [iris, irisRing1, irisRing2, pupil];
  parts.forEach(el => {
    el.setAttribute('cx', x);
    el.setAttribute('cy', y);
  });
  h1.setAttribute('cx', x + 7);
  h1.setAttribute('cy', y - 7);
  h2.setAttribute('cx', x + 12);
  h2.setAttribute('cy', y - 10);
}

function updateLids(progress) {
  // progress 0=open, 1=closed
  // Top lid drops down, bottom lid rises up
  const topDrop  = progress * 45;
  const botRise  = progress * 38;
  const topCtrl  = -90 + topDrop * 2.1;
  const botCtrl  =  70 - botRise * 1.8;
  lidTop.setAttribute('d', `M -95,0 Q 0,${topCtrl} 95,0`);
  lidBot.setAttribute('d', `M -95,0 Q 0,${botCtrl} 95,0`);
}

function loop() {
  autonomousTarget();

  // Smooth follow
  currentX += (targetX - currentX) * 0.1;
  currentY += (targetY - currentY) * 0.1;

  // Clamp to ellipse
  const nx = currentX / EYE_W, ny = currentY / EYE_H;
  const len = Math.sqrt(nx*nx + ny*ny);
  let cx = currentX, cy = currentY;
  if (len > 0.32) {
    cx = nx / len * 0.32 * EYE_W;
    cy = ny / len * 0.32 * EYE_H;
  }

  moveElements(cx, cy);
  updateLids(blinkProgress);

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
